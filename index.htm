<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiper Express – Cross Reference Lookup</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --surface: #f5f5f5;
    --card: #f9f9f9;
    --border: #e0e0e0;
    --border-dark: #ccc;
    --text: #111111;
    --muted: #888;
    --accent: #111;
    --row-even: #fafafa;
    --row-odd: #ffffff;
    --row-hover: #f0f4ff;
    --header-bg: #111111;
    --header-text: #ffffff;
    --chip-active-bg: #111;
    --chip-active-text: #fff;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--header-bg);
    padding: 22px 40px 18px;
    display: flex;
    align-items: center;
    gap: 28px;
  }

  .logo-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 1.85rem;
    letter-spacing: 0.06em;
    line-height: 1;
    text-transform: uppercase;
    color: #fff;
  }

  .logo-since {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.58rem;
    letter-spacing: 0.28em;
    color: #888;
    text-align: center;
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .logo-since::before, .logo-since::after {
    content: ''; flex: 1; height: 1px; background: #333;
  }

  .hdr-divider { width: 1px; height: 44px; background: #333; }

  .hdr-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 1rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #aaa;
  }

  .hdr-count {
    margin-left: auto;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    color: #555;
    text-transform: uppercase;
  }

  /* SEARCH */
  .search-section {
    padding: 30px 40px 0;
    max-width: 920px;
    margin: 0 auto;
  }

  .search-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 9px;
  }

  .search-input-wrap { position: relative; }

  .search-icon {
    position: absolute; left: 15px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted); font-size: 1rem; pointer-events: none;
  }

  #searchInput {
    width: 100%;
    background: var(--card);
    border: 1.5px solid var(--border-dark);
    border-radius: 3px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 1.05rem;
    font-weight: 400;
    padding: 14px 42px 14px 44px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  #searchInput::placeholder { color: #bbb; }
  #searchInput:focus { border-color: #888; background: #fff; }

  .clear-btn {
    position: absolute; right: 13px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 1rem; display: none; padding: 4px; line-height: 1;
  }
  .clear-btn:hover { color: var(--text); }

  /* TYPE FILTER */
  .type-row {
    display: flex; gap: 7px; margin-top: 14px;
    flex-wrap: wrap; align-items: center;
  }

  .filter-label {
    font-size: 0.65rem; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--muted); margin-right: 2px;
  }

  .chip {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.72rem; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 5px 13px; border-radius: 2px;
    border: 1.5px solid var(--border-dark);
    background: transparent; color: var(--muted);
    cursor: pointer; transition: all 0.15s;
  }
  .chip:hover { border-color: #555; color: var(--text); }
  .chip.active { background: var(--chip-active-bg); color: var(--chip-active-text); border-color: var(--chip-active-bg); }

  /* STATUS */
  .status-bar {
    max-width: 920px; margin: 0 auto;
    padding: 12px 40px 0;
    display: flex; justify-content: space-between; align-items: center;
  }

  .result-count { font-size: 0.73rem; letter-spacing: 0.07em; color: var(--muted); }
  .result-count strong { color: #111; font-weight: 600; }

  /* TABLE */
  .results-section {
    max-width: 920px; margin: 14px auto 60px;
    padding: 0 40px;
  }

  .table-wrap {
    border: 1.5px solid var(--border);
    border-radius: 5px; overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }

  thead tr { background: #f0f0f0; border-bottom: 2px solid var(--border); }

  th {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 0.67rem;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--muted); padding: 11px 16px;
    text-align: left; cursor: pointer;
    user-select: none; white-space: nowrap;
  }
  th:hover { color: var(--text); }
  th .sa { display: inline-block; margin-left: 4px; opacity: 0.25; font-size: 0.6rem; }
  th.sorted .sa { opacity: 1; color: #111; }

  tbody tr { border-bottom: 1px solid #ebebeb; transition: background 0.1s; }
  tbody tr:nth-child(even) { background: var(--row-even); }
  tbody tr:nth-child(odd)  { background: var(--row-odd); }
  tbody tr:hover { background: var(--row-hover); }
  tbody tr:last-child { border-bottom: none; }

  td { padding: 10px 16px; vertical-align: middle; color: var(--text); font-weight: 300; }

  td.col-pn {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 0.97rem;
    letter-spacing: 0.05em; color: #111;
  }

  .type-badge {
    display: inline-block;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    padding: 3px 8px; border-radius: 2px;
    border: 1px solid #ddd; color: #777;
    background: #f5f5f5;
  }

  .hm { background: #fff3b0; color: #6b5900; border-radius: 2px; padding: 0 1px; }

  /* EMPTY */
  .empty-state { text-align: center; padding: 56px 20px; color: var(--muted); }
  .empty-state .ei { font-size: 2.2rem; margin-bottom: 10px; opacity: 0.3; }
  .empty-state p { font-size: 0.88rem; letter-spacing: 0.04em; line-height: 1.6; color: #aaa; }

  footer {
    border-top: 1.5px solid var(--border);
    padding: 14px 40px;
    text-align: center;
    font-size: 0.65rem; letter-spacing: 0.14em;
    color: #bbb; text-transform: uppercase;
  }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: #f5f5f5; }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

  @media (max-width: 600px) {
    header { padding: 14px 16px; }
    .search-section, .status-bar, .results-section { padding-left: 12px; padding-right: 12px; }
    .logo-text { font-size: 1.4rem; }
    td, th { padding: 9px 10px; font-size: 0.8rem; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo-text">WIPER<br>EXPRESS</div>
    <div class="logo-since">SINCE 1991</div>
  </div>
  <div class="hdr-divider"></div>
  <div class="hdr-title">Cross Reference Lookup</div>
  <div class="hdr-count" id="totalCount"></div>
</header>

<div class="search-section">
  <div class="search-label">Search by part number, cross reference brand, or part type</div>
  <div class="search-input-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput"
      placeholder="e.g.  CLX-22  ·  BOSCH  ·  Wiper Arm  ·  8-916…"
      autocomplete="off" spellcheck="false">
    <button class="clear-btn" id="clearBtn">✕</button>
  </div>

  <div class="type-row" id="typeFilterRow">
    <span class="filter-label">Filter:</span>
  </div>
</div>

<div class="status-bar">
  <div class="result-count" id="resultCount"></div>
</div>

<div class="results-section">
  <div class="table-wrap" id="tableWrap">
    <div class="empty-state"><div class="ei">⌕</div><p>Start typing to search<br>3,614 cross-reference records loaded</p></div>
  </div>
</div>

<footer>Wiper Express &nbsp;·&nbsp; Since 1991 &nbsp;·&nbsp; Cross Reference Database</footer>

"IM 263722"]];

let activeType = 'all';
let sortCol = -1;
let sortDir = 1;
let debounceTimer;

// Build type filter chips
const types = ['all', ...new Set(ALL_ROWS.map(r => r[0]).filter(Boolean).sort())];
const typeRow = document.getElementById('typeFilterRow');
types.forEach(t => {
  const btn = document.createElement('button');
  btn.className = 'chip' + (t === 'all' ? ' active' : '');
  btn.dataset.type = t;
  btn.textContent = t === 'all' ? 'All Types' : t;
  btn.addEventListener('click', () => {
    typeRow.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeType = t;
    render(document.getElementById('searchInput').value.trim());
  });
  typeRow.appendChild(btn);
});

document.getElementById('totalCount').textContent = ALL_ROWS.length.toLocaleString() + ' records';

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

function highlight(text, tokens) {
  if (!tokens.length) return esc(text);
  let r = esc(text);
  tokens.forEach(t => {
    r = r.replace(new RegExp('(' + escRe(t) + ')', 'gi'), '<span class="hm">$1</span>');
  });
  return r;
}

function render(query) {
  const tokens = query.toLowerCase().split(/\s+/).filter(Boolean);

  let filtered = ALL_ROWS.filter(row => {
    if (activeType !== 'all' && row[0] !== activeType) return false;
    if (!tokens.length) return true;
    const hay = row.join(' ').toLowerCase();
    return tokens.every(t => hay.includes(t));
  });

  if (sortCol >= 0) {
    filtered = [...filtered].sort((a, b) => {
      const av = (a[sortCol]||'').toLowerCase();
      const bv = (b[sortCol]||'').toLowerCase();
      const an = parseFloat(av), bn = parseFloat(bv);
      if (!isNaN(an) && !isNaN(bn)) return (an - bn) * sortDir;
      return av.localeCompare(bv) * sortDir;
    });
  }

  const wrap = document.getElementById('tableWrap');
  const count = document.getElementById('resultCount');
  const total = ALL_ROWS.length;

  if (!filtered.length) {
    const msg = query ? `No results for "<strong>${esc(query)}</strong>"` : 'No records match this filter.';
    wrap.innerHTML = `<div class="empty-state"><div class="ei">◎</div><p>${msg}</p></div>`;
    count.innerHTML = '';
    return;
  }

  count.innerHTML = `<strong>${filtered.length.toLocaleString()}</strong> result${filtered.length!==1?'s':''}${filtered.length<total?' of '+total.toLocaleString()+' total':''}${filtered.length>500?' &nbsp;·&nbsp; showing first 500':''}`;

  let html = '<table><thead><tr>';
  HEADERS.forEach((h, i) => {
    const arrow = sortCol === i ? (sortDir===1?'▲':'▼') : '▲';
    const cls = sortCol === i ? ' class="sorted"' : '';
    html += `<th${cls} data-idx="${i}">${esc(h)}<span class="sa">${arrow}</span></th>`;
  });
  html += '</tr></thead><tbody>';

  filtered.slice(0, 500).forEach(row => {
    html += '<tr>';
    row.forEach((cell, ci) => {
      if (ci === 0) {
        html += `<td><span class="type-badge">${highlight(cell, tokens)}</span></td>`;
      } else if (ci === 1) {
        html += `<td class="col-pn">${highlight(cell, tokens)}</td>`;
      } else {
        html += `<td>${highlight(cell, tokens)}</td>`;
      }
    });
    html += '</tr>';
  });

  html += '</tbody></table>';
  wrap.innerHTML = html;

  wrap.querySelectorAll('th[data-idx]').forEach(th => {
    th.addEventListener('click', () => {
      const idx = parseInt(th.dataset.idx);
      if (sortCol === idx) sortDir *= -1; else { sortCol = idx; sortDir = 1; }
      render(document.getElementById('searchInput').value.trim());
    });
  });
}

const input = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearBtn');

input.addEventListener('input', () => {
  clearBtn.style.display = input.value ? 'block' : 'none';
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => render(input.value.trim()), 100);
});

clearBtn.addEventListener('click', () => {
  input.value = ''; clearBtn.style.display = 'none';
  render(''); input.focus();
});

render('');
</script>

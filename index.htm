<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiper Express – Cross Reference Lookup</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --wx-black: #0A0A0A;
    --wx-white: #FFFFFF;
    --wx-blue: #0057FF;
    --wx-blue-dark: #003DBF;
    --wx-blue-mid: #3378FF;
    --wx-blue-light: #E5EEFF;
    --wx-gray-100: #F7F7F7;
    --wx-gray-200: #EDEDED;
    --wx-gray-400: #AAAAAA;
    --wx-gray-600: #666666;
    --wx-gray-800: #2A2A2A;
    --font-display: 'Barlow Condensed', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --bg: #ffffff;
    --surface: var(--wx-gray-100);
    --card: var(--wx-gray-100);
    --border: var(--wx-gray-200);
    --border-dark: #ccc;
    --text: var(--wx-black);
    --muted: var(--wx-gray-400);
    --accent: var(--wx-black);
    --row-even: #fafafa;
    --row-odd: #ffffff;
    --row-hover: var(--wx-blue-light);
    --header-bg: var(--wx-black);
    --header-text: var(--wx-white);
    --chip-active-bg: var(--wx-black);
    --chip-active-text: #fff;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-weight: 300;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--header-bg);
    padding: 22px 40px 18px;
    display: flex;
    align-items: center;
    gap: 28px;
    border-bottom: 3px solid var(--wx-blue);
  }

  .logo-text {
    display: none;
  }
  .nav-logo img {
    height: 28px;
    display: block;
  }

  .logo-since {
    display: none;
  }

  .hdr-divider { width: 1px; height: 44px; background: #333; }

  .hdr-title {
    font-family: var(--font-mono);
    font-weight: 400;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--wx-gray-400);
  }

  .hdr-count {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,.3);
    text-transform: uppercase;
  }

  /* SEARCH */
  .search-section {
    padding: 30px 40px 0;
    max-width: 920px;
    margin: 0 auto;
  }

  .search-label {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--wx-gray-400);
    margin-bottom: 9px;
  }

  .search-input-wrap { position: relative; }

  .search-icon {
    position: absolute; left: 15px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted); font-size: 1rem; pointer-events: none;
  }

  #searchInput {
    width: 100%;
    background: var(--card);
    border: 1.5px solid var(--border-dark);
    border-radius: 3px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 1.05rem;
    font-weight: 400;
    padding: 14px 42px 14px 44px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  #searchInput::placeholder { color: #bbb; }
  #searchInput:focus { border-color: var(--wx-blue); background: #fff; box-shadow: 0 0 0 3px rgba(0,87,255,.1); }

  .clear-btn {
    position: absolute; right: 13px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 1rem; display: none; padding: 4px; line-height: 1;
  }
  .clear-btn:hover { color: var(--text); }

  /* TYPE FILTER */
  .type-row {
    display: flex; gap: 7px; margin-top: 14px;
    flex-wrap: wrap; align-items: center;
  }

  .filter-label {
    font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--wx-gray-400); margin-right: 2px;
  }

  .chip {
    font-family: var(--font-mono);
    font-size: 0.65rem; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 5px 13px; border-radius: 3px;
    border: 1px solid var(--wx-gray-200);
    background: transparent; color: var(--wx-gray-600);
    cursor: pointer; transition: all 0.15s;
  }
  .chip:hover { border-color: #555; color: var(--text); }
  .chip.active { background: var(--chip-active-bg); color: var(--chip-active-text); border-color: var(--chip-active-bg); }

  /* STATUS */
  .status-bar {
    max-width: 920px; margin: 0 auto;
    padding: 12px 40px 0;
    display: flex; justify-content: space-between; align-items: center;
  }

  .result-count { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.07em; color: var(--wx-gray-400); }
  .result-count strong { color: var(--wx-black); font-weight: 500; }

  /* TABLE */
  .results-section {
    max-width: 920px; margin: 14px auto 60px;
    padding: 0 40px;
  }

  .table-wrap {
    border: 1px solid var(--wx-gray-200);
    border-radius: 8px; overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }

  table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }

  thead tr { background: var(--wx-blue-light); border-bottom: 2px solid rgba(0,87,255,.15); }

  th {
    font-family: var(--font-mono);
    font-weight: 500; font-size: 0.6rem;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--wx-blue-dark); padding: 11px 16px;
    text-align: left; cursor: pointer;
    user-select: none; white-space: nowrap;
  }
  th:hover { color: var(--text); }
  th .sa { display: inline-block; margin-left: 4px; opacity: 0.25; font-size: 0.6rem; }
  th.sorted .sa { opacity: 1; color: #111; }

  tbody tr { border-bottom: 1px solid #ebebeb; transition: background 0.1s; }
  tbody tr:nth-child(even) { background: var(--row-even); }
  tbody tr:nth-child(odd)  { background: var(--row-odd); }
  tbody tr:hover { background: var(--row-hover); }
  tbody tr:last-child { border-bottom: none; }

  td { padding: 10px 16px; vertical-align: middle; color: var(--text); font-weight: 300; }

  td.col-pn {
    font-family: var(--font-display);
    font-weight: 700; font-size: 0.97rem;
    letter-spacing: 0.05em; color: var(--wx-black);
  }

  .type-badge {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 0.58rem; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 3px 8px; border-radius: 3px;
    border: none; color: var(--wx-blue-dark);
    background: var(--wx-blue-light);
  }

  .hm { background: #fff3b0; color: #6b5900; border-radius: 2px; padding: 0 1px; }

  /* EMPTY */
  .empty-state { text-align: center; padding: 56px 20px; color: var(--muted); }
  .empty-state .ei { font-size: 2.2rem; margin-bottom: 10px; opacity: 0.08; }
  .empty-state p { font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.1em; line-height: 1.7; color: var(--wx-gray-400); text-transform: uppercase; }

  footer {
    background: var(--wx-blue-light);
    border-top: 1px solid rgba(0,87,255,.12);
    padding: 18px 40px;
    text-align: center;
    font-family: var(--font-mono);
    font-size: 0.6rem; letter-spacing: 0.1em;
    color: var(--wx-blue-dark); text-transform: uppercase;
  }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: #f5f5f5; }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

  @media (max-width: 600px) {
    header { padding: 14px 16px; }
    .search-section, .status-bar, .results-section { padding-left: 12px; padding-right: 12px; }
    .logo-text { font-size: 1.4rem; }
    td, th { padding: 9px 10px; font-size: 0.8rem; }
  }
</style>
</head>

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

function highlight(text, tokens) {
  if (!tokens.length) return esc(text);
  let r = esc(text);
  tokens.forEach(t => {
    r = r.replace(new RegExp('(' + escRe(t) + ')', 'gi'), '<span class="hm">$1</span>');
  });
  return r;
}

      const an = parseFloat(av), bn = parseFloat(bv);
      if (!isNaN(an) && !isNaN(bn)) return (an - bn) * sortDir;
      return av.localeCompare(bv) * sortDir;
    });
  }

  const wrap = document.getElementById('tableWrap');
  const count = document.getElementById('resultCount');
  const total = ALL_ROWS.length;

  if (!filtered.length) {
    const msg = query ? `No results for "<strong>${esc(query)}</strong>"` : 'No records match this filter.';
    wrap.innerHTML = `<div class="empty-state"><div class="ei">◎</div><p>${msg}</p></div>`;
    count.innerHTML = '';
    return;
  }

  count.innerHTML = `<strong>${filtered.length.toLocaleString()}</strong> result${filtered.length!==1?'s':''}${filtered.length<total?' of '+total.toLocaleString()+' total':''}${filtered.length>500?' &nbsp;·&nbsp; showing first 500':''}`;

  let html = '<table><thead><tr>';
  HEADERS.forEach((h, i) => {
    const arrow = sortCol === i ? (sortDir===1?'▲':'▼') : '▲';
    const cls = sortCol === i ? ' class="sorted"' : '';
    html += `<th${cls} data-idx="${i}">${esc(h)}<span class="sa">${arrow}</span></th>`;
  });
  html += '</tr></thead><tbody>';

  filtered.slice(0, 500).forEach(row => {
    html += '<tr>';
    row.forEach((cell, ci) => {
      if (ci === 0) {
        html += `<td><span class="type-badge">${highlight(cell, tokens)}</span></td>`;
      } else if (ci === 1) {
        html += `<td class="col-pn">${highlight(cell, tokens)}</td>`;
      } else {
        html += `<td>${highlight(cell, tokens)}</td>`;
      }
    });
    html += '</tr>';
  });

  html += '</tbody></table>';
  wrap.innerHTML = html;

  wrap.querySelectorAll('th[data-idx]').forEach(th => {
    th.addEventListener('click', () => {
      const idx = parseInt(th.dataset.idx);
      if (sortCol === idx) sortDir *= -1; else { sortCol = idx; sortDir = 1; }
      render(document.getElementById('searchInput').value.trim());
    });
  });
}

const input = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearBtn');

input.addEventListener('input', () => {
  clearBtn.style.display = input.value ? 'block' : 'none';
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => render(input.value.trim()), 100);
});

clearBtn.addEventListener('click', () => {
  input.value = ''; clearBtn.style.display = 'none';
  render(''); input.focus();
});

render('');
</script>
</body>
</html>
